services:
  - type: web
    name: xox-arena
    runtime: node
    buildCommand: npm install && npm run build
    startCommand: npm start
    envVars:
      - key: NODE_ENV
        value: production
      - key: JWT_SECRET
        generateValue: true
      - key: MONGO_URI
        sync: false
    healthCheckPath: /api/status
    autoDeploy: true
